version: '3.8'

services:
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: zxc
    ports:
      - "5432:5432"

  app:
    build: .
    dns:
    - 8.8.8.8
    - 8.8.4.4
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db          # имя сервиса в compose
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: zxc
      DB_NAME: ${DB_NAME:-invent}
